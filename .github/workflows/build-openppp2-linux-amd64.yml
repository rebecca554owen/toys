name: build-openppp2-linux-amd64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '输入 openppp2 的 tag 名称'
        required: true
        default: 'v4.5.0'

permissions:
  contents: write

jobs:
  build:
    name: Linux amd64 ${{ matrix.suffix }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: ""
            enable_sysnat: "OFF"
            enable_io_uring: "OFF"
            enable_simd: "OFF"
          - suffix: "-io-uring"
            enable_sysnat: "OFF"
            enable_io_uring: "ON"
            enable_simd: "OFF"
          - suffix: "-simd"
            enable_sysnat: "OFF"
            enable_io_uring: "OFF"
            enable_simd: "ON"
          - suffix: "-tc"
            enable_sysnat: "ON"
            enable_io_uring: "OFF"
            enable_simd: "OFF"
          - suffix: "-tc-io-uring"
            enable_sysnat: "ON"
            enable_io_uring: "ON"
            enable_simd: "OFF"
          - suffix: "-tc-simd"
            enable_sysnat: "ON"
            enable_io_uring: "OFF"
            enable_simd: "ON"
          - suffix: "-io-uring-simd"
            enable_sysnat: "OFF"
            enable_io_uring: "ON"
            enable_simd: "ON"
          - suffix: "-tc-io-uring-simd"
            enable_sysnat: "ON"
            enable_io_uring: "ON"
            enable_simd: "ON"

    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
      BOOST_VERSION: 1.86.0
      JEMALLOC_VERSION: 5.3.0
      OPENSSL_VERSION: 4.0.0

    steps:
    - name: Checkout openppp2 repository
      uses: actions/checkout@v6
      with:
        repository: rebecca554owen/openppp2
        path: openppp2
        ref: inet6

    - name: Install Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake git zip unzip curl wget \
          libkrb5-dev libicu-dev libssl-dev libunwind-dev \
          autoconf clang \
          liburing-dev libbpf-dev

    - name: Get openppp2 tag
      id: get-tag
      run: |
        TAG="${{ github.event.inputs.tag }}"
        DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d%H%M%S')
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "app_version=2.0.0.0-${DATE}" >> $GITHUB_OUTPUT

    - name: Validate openppp2 tag
      run: |
        if [[ ! "${{ steps.get-tag.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "错误：标签格式无效，应为v*.*.*"
          exit 1
        fi

    - name: Set artifact name
      run: |
        echo "ARTIFACT_NAME=openppp2-linux-amd64${{ matrix.suffix }}.zip" >> $GITHUB_ENV

    - name: Set version in source code
      run: |
        APP_VERSION="${{ steps.get-tag.outputs.app_version }}"
        cd openppp2
        sed -i "s/#define PPP_APPLICATION_VERSION (\"[^\"]*\")/#define PPP_APPLICATION_VERSION (\"${APP_VERSION}\")/" ppp/stdafx.h

    - name: Cache third-party libraries
      id: cache-third
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/third-party
        key: linux-amd64-third-v1-ubuntu22.04-boost${{ env.BOOST_VERSION }}-openssl${{ env.OPENSSL_VERSION }}-jemalloc${{ env.JEMALLOC_VERSION }}

    - name: Build Boost
      if: steps.cache-third.outputs.cache-hit != 'true'
      run: |
        set -euxo pipefail
        mkdir -p third-party && cd third-party
        BOOST_VERSION_UNDERSCORE=$(echo "${{ env.BOOST_VERSION }}" | sed 's/\./_/g')
        curl -L -o boost.tar.gz "https://archives.boost.io/release/${{ env.BOOST_VERSION }}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
        tar -xzf boost.tar.gz
        rm -rf boost boost.tar.gz
        mv boost_* boost
        cd boost
        ./bootstrap.sh
        ./b2 cxxflags=-fPIC -j "$(nproc)"

    - name: Build Jemalloc
      if: steps.cache-third.outputs.cache-hit != 'true'
      run: |
        mkdir -p third-party && cd third-party
        wget -q "https://github.com/jemalloc/jemalloc/releases/download/${{ env.JEMALLOC_VERSION }}/jemalloc-${{ env.JEMALLOC_VERSION }}.tar.bz2"
        tar jxf jemalloc-*.tar.bz2
        rm -rf jemalloc-*.tar.bz2
        rm -rf jemalloc
        mv jemalloc-* jemalloc
        cd jemalloc
        ./autogen.sh --with-jemalloc-prefix=je_
        make -j "$(nproc)"

    - name: Build OpenSSL
      if: steps.cache-third.outputs.cache-hit != 'true'
      run: |
        mkdir -p third-party && cd third-party
        wget -q "https://github.com/openssl/openssl/releases/download/openssl-${{ env.OPENSSL_VERSION }}/openssl-${{ env.OPENSSL_VERSION }}.tar.gz"
        tar zxf openssl-*.tar.gz
        rm -rf openssl-*.tar.gz
        rm -rf openssl
        mv openssl-* openssl
        cd openssl
        ./Configure
        make -j "$(nproc)"

    - name: Build openppp2
      run: |
        cd openppp2
        TP="$GITHUB_WORKSPACE/third-party"
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DTHIRD_PARTY_LIBRARY_DIR="$TP" \
          -DENABLE_SYSNAT=${{ matrix.enable_sysnat }} \
          -DENABLE_IO_URING=${{ matrix.enable_io_uring }} \
          -DENABLE_SIMD=${{ matrix.enable_simd }}
        make -j "$(nproc)"

    - name: Package openppp2
      run: |
        cd openppp2/bin
        zip -r "${{ env.ARTIFACT_NAME }}" ppp

    - name: Upload openppp2
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: openppp2/bin/${{ env.ARTIFACT_NAME }}

    - name: Record build time
      run: |
        echo "BUILD_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.get-tag.outputs.tag }}
        artifacts: openppp2/bin/${{ env.ARTIFACT_NAME }}
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Version: ${{ steps.get-tag.outputs.app_version }}
          Build Time: ${{ env.BUILD_TIME }}
