name: build-openppp2-android-apk

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '输入 openppp2 的 tag 名称'
        required: true
        default: 'v4.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Android APK arm64-v8a
    runs-on: ubuntu-22.04

    env:
      NDK_VERSION: r20b
      APK_NAME: openppp2-arm64-v8a.apk

    steps:
    - name: Get openppp2 tag
      id: get-tag
      run: |
        TAG="${{ github.event.inputs.tag }}"
        DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d')
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "app_version=1.0.0-${DATE}" >> $GITHUB_OUTPUT

    - name: Validate openppp2 tag
      run: |
        if [[ ! "${{ steps.get-tag.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "错误：标签格式无效，应为v*.*.*"
          exit 1
        fi

    - name: Checkout openppp2 repository
      uses: actions/checkout@v6
      with:
        repository: rebecca554owen/openppp2
        path: openppp2
        ref: inet6

    - name: Install build dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake git zip unzip curl wget xz-utils \
          openjdk-17-jdk

    - name: Cache Android NDK and third-party dependencies
      id: cache-android-third
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/android-third
        key: android-apk-v1-ubuntu22.04-ndk${{ env.NDK_VERSION }}-boost174-openssl111i

    - name: Download Android NDK
      if: steps.cache-android-third.outputs.cache-hit != 'true'
      run: |
        mkdir -p "${{ runner.temp }}/android-third"
        cd "${{ runner.temp }}/android-third"
        wget -q https://dl.google.com/android/repository/android-ndk-r20b-linux-x86_64.zip
        unzip -q android-ndk-r20b-linux-x86_64.zip
        rm -f android-ndk-r20b-linux-x86_64.zip
        mv android-ndk-r20b ndk

    - name: Clone Boost for Android
      if: steps.cache-android-third.outputs.cache-hit != 'true'
      run: |
        mkdir -p "${{ runner.temp }}/android-third"
        git clone --depth 1 https://github.com/liulilittle/boost-1.74-for-android-r20b-fpic.git "${{ runner.temp }}/android-third/boost"

    - name: Clone OpenSSL for Android
      if: steps.cache-android-third.outputs.cache-hit != 'true'
      run: |
        mkdir -p "${{ runner.temp }}/android-third"
        git clone --depth 1 https://github.com/liulilittle/openssl-1.1.1i-for-android-r20b.git "${{ runner.temp }}/android-third/openssl"

    - name: Build openppp2 Android arm64-v8a library
      run: |
        NDK_ROOT="${{ runner.temp }}/android-third/ndk"
        TP="${{ runner.temp }}/android-third"
        export PPP_ANDROID_ABI=aarch64

        cd openppp2/android
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
          -DCMAKE_SYSTEM_NAME=Android \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_NATIVE_API_LEVEL=21 \
          -DANDROID_STL=c++_static \
          -DTHIRD_PARTY_LIBRARY_DIR="$TP"
        make -j "$(nproc)"

    - name: Inject JNI library into Flutter project
      run: |
        mkdir -p openppp2/android/android/app/src/main/jniLibs/arm64-v8a
        cp openppp2/bin/android/arm64-v8a/libopenppp2.so openppp2/android/android/app/src/main/jniLibs/arm64-v8a/libopenppp2.so
        test -f openppp2/android/android/app/src/main/jniLibs/arm64-v8a/libopenppp2.so

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Flutter doctor and pub get
      run: |
        flutter doctor -v
        cd openppp2/android
        flutter pub get

    - name: Build release APK
      run: |
        cd openppp2/android
        flutter build apk --release

    - name: Rename APK
      run: |
        cp openppp2/android/build/app/outputs/flutter-apk/app-release.apk "${{ env.APK_NAME }}"
        test -f "${{ env.APK_NAME }}"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_NAME }}
        path: ${{ env.APK_NAME }}
        if-no-files-found: error

    - name: Record build time
      run: |
        echo "BUILD_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.get-tag.outputs.tag }}
        artifacts: ${{ env.APK_NAME }}
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
        body: |
          Version: ${{ steps.get-tag.outputs.app_version }}
          Upstream Tag: ${{ steps.get-tag.outputs.tag }}
          Artifact Type: APK
          ABI: arm64-v8a
          Build Time: ${{ env.BUILD_TIME }}
